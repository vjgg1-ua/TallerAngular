<div>
    <div class="d-flex gap-2 align-items-center justify-content-between">
        <div>
            <p>{{tarea.nombre}}</p>
        </div>
        <div class=" align-items-center">
            <button class="btn btn-danger" (click)="eliminarTarea()">❌</button>
            <button *ngIf="tarea.estado !== 'completa'" class="btn btn-success" (click)="completarTarea()">✔</button>
        </div>
    </div>
</div>
